name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without the leading v (e.g. 0.1.4). Defaults to the VERSION file."
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Needed so the workflow_dispatch path can push the release tag.
          # Tags pushed with GITHUB_TOKEN do not re-trigger this workflow.
          persist-credentials: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          check-latest: true

      - name: resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="$(tr -d ' \t\r\n' < VERSION)"
            fi
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "could not resolve a version to release" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "resolved release version: v$VERSION"

      - name: create and push tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "tag v$VERSION already exists on origin; bump VERSION or pass a new input" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: goreleaser
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: update version
        working-directory: npm-package
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i "s/const VERSION = \".*\"/const VERSION = \"$VERSION\"/" scripts/install.js

      - name: publish
        working-directory: npm-package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: goreleaser
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: update version
        working-directory: pypi-package
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" bumblebee_scanner/__init__.py
          sed -i "s/^VERSION = \".*\"/VERSION = \"$VERSION\"/" bumblebee_scanner/cli.py

      - name: build
        working-directory: pypi-package
        run: |
          pip install build
          python -m build

      - name: publish
        working-directory: pypi-package
        run: |
          pip install twine
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
