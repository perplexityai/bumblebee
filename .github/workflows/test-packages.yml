name: test-packages

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-npm:
    name: npm install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: install local npm package
        run: npm install -g ./npm-package

      - name: verify bumblebee is on PATH
        run: which bumblebee || echo "binary not on PATH (expected if no GitHub release)"

  test-pip:
    name: pip install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: install local pip package
        run: pip install ./pypi-package

      - name: verify bumblebee entrypoint exists
        run: which bumblebee

      - name: run bumblebee --help
        run: bumblebee --help || echo "binary not available (expected if no GitHub release)"
