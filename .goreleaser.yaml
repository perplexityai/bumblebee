version: 2

project_name: bumblebee

before:
  hooks:
    - go mod tidy

builds:
  - id: bumblebee
    main: ./cmd/bumblebee
    binary: bumblebee
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Tag}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: bumblebee
    formats:
      - tar.gz
    name_template: >-
      bumblebee_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - threat_intel/**

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: false
  prerelease: auto
  # Replace artifacts on an existing release for the tag instead of
  # failing. This keeps the publish pipeline working when a release was
  # pre-created in the UI or the workflow is re-run on the same tag.
  mode: replace

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
