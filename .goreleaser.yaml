version: 2

project_name: bumblebee

before:
  hooks:
    - go mod tidy

builds:
  - id: bumblebee
    main: ./cmd/bumblebee
    binary: bumblebee
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Tag}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: bumblebee
    formats:
      - tar.gz
    name_template: >-
      bumblebee_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - threat_intel/**

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: true
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

brews:
  - name: bumblebee
    repository:
      owner: perplexityai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/perplexityai/bumblebee"
    description: "Read-only developer endpoint scanner for supply-chain exposure"
    license: "Apache-2.0"
    install: |
      bin.install "bumblebee"
      pkgshare.install "threat_intel"
    test: |
      assert_match version.to_s, shell_output("#{bin}/bumblebee version")
      assert_match "selftest OK", shell_output("#{bin}/bumblebee selftest")
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
